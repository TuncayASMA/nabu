# Nabu — Docker Compose deployment
#
# Required environment variables (set in .env or shell):
#   NABU_PSK        — Pre-shared key for AES-256-GCM encryption (required)
#   NABU_RELAY_PORT — UDP port the relay listens on (default: 7000)
#   NABU_SOCKS_PORT — TCP port the SOCKS5 proxy listens on (default: 1080)
#   NABU_RELAY_ADDR — Relay address as seen by the client (default: relay:7000)
#
# Usage:
#   cp .env.example .env   # fill in NABU_PSK
#   docker compose up -d
#
# To run relay only   (on the server):   docker compose up -d nabu-relay
# To run client only  (on the device):   NABU_RELAY_ADDR=host:7000 docker compose up -d nabu-client

services:
  nabu-relay:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay
    image: nabu-relay:latest
    restart: unless-stopped
    environment:
      - NABU_LISTEN=${NABU_RELAY_PORT:-7000}
      - NABU_PSK=${NABU_PSK:?NABU_PSK is required}
    ports:
      - "${NABU_RELAY_PORT:-7000}:7000/udp"
    # OCI ARM64 instances: resource limits prevent a single container
    # from consuming all bandwidth during a rate-limit test.
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 128M
    command:
      - "--listen=:${NABU_RELAY_PORT:-7000}"
      - "--psk=${NABU_PSK}"
      - "--rate-limit=100"
    networks:
      - nabu-net

  nabu-client:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    image: nabu-client:latest
    restart: unless-stopped
    environment:
      - NABU_RELAY=${NABU_RELAY_ADDR:-relay:7000}
      - NABU_PSK=${NABU_PSK:?NABU_PSK is required}
    ports:
      - "${NABU_SOCKS_PORT:-1080}:1080/tcp"
    command:
      - "--relay=${NABU_RELAY_ADDR:-relay:7000}"
      - "--psk=${NABU_PSK}"
      - "--socks=:1080"
    depends_on:
      - nabu-relay
    networks:
      - nabu-net

networks:
  nabu-net:
    driver: bridge
