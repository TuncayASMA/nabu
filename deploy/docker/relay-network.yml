# Nabu — Relay Network Docker Compose
#
# This compose is a local topology helper that brings up two relays and one
# client. With the current nabu-client CLI, the client uses a single selected
# relay endpoint (FR by default). Secondary relay runs for topology parity and
# can be switched via RELAY_FR_HOST/RELAY_FR_PORT overrides.

services:
  nabu-relay-fr:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay
    image: nabu-relay:latest
    restart: unless-stopped
    ports:
      - "${RELAY_FR_PORT:-7001}:7001/udp"
    command:
      - "--listen=:7001"
      - "--psk=${NABU_PSK:?NABU_PSK is required}"
      - "--rate-limit=100"
    networks:
      - nabu-mp-net

  nabu-relay-de:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.relay
    image: nabu-relay:latest
    restart: unless-stopped
    ports:
      - "${RELAY_DE_PORT:-7002}:7002/udp"
    command:
      - "--listen=:7002"
      - "--psk=${NABU_PSK:?NABU_PSK is required}"
      - "--rate-limit=100"
    networks:
      - nabu-mp-net

  nabu-client-mp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.client
    image: nabu-client:latest
    restart: unless-stopped
    ports:
      - "${NABU_SOCKS_PORT:-1080}:1080/tcp"
    command:
      - "--relay-host=${RELAY_FR_HOST:-nabu-relay-fr}"
      - "--relay-port=${RELAY_FR_PORT:-7001}"
      - "--psk=${NABU_PSK:?NABU_PSK is required}"
      - "--socks-listen=0.0.0.0:1080"
    depends_on:
      - nabu-relay-fr
      - nabu-relay-de
    networks:
      - nabu-mp-net

networks:
  nabu-mp-net:
    driver: bridge
